services:
  db:
    image: postgres:16-alpine
    container_name: clinic-booking-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: clinic
      POSTGRES_PASSWORD: clinic
      POSTGRES_DB: clinic_booking
    ports:
      - "5433:5432"
    volumes:
      - clinic_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic -d clinic_booking"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  clinic_pgdata:
