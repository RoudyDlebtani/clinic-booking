<!doctype html>
<html lang="en" class="h-full antialiased" suppressHydrationWarning>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediBook — Clinic Appointment System</title>
    <meta
      name="description"
      content="Browse doctors by specialty and book appointments in real time, with live availability and no double-booking."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Set the theme class before paint to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var dark = stored
            ? stored === "dark"
            : window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="min-h-full flex flex-col">
    <div id="root" class="flex flex-1 flex-col"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
